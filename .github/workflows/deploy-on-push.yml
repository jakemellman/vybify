name: Deploy on push

# Cloudflare's built-in GitHub auto-deploy occasionally misses pushes.
# This workflow ensures every push to main triggers a build via the
# deploy hook as a fallback. Cloudflare deduplicates concurrent builds
# for the same commit, so this is safe.

on:
  push:
    branches: [main]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare build
        run: |
          if [ -z "${{ secrets.DEPLOY_HOOK_URL }}" ]; then
            echo "DEPLOY_HOOK_URL secret not set."
            exit 1
          fi
          curl -fsS -X POST "${{ secrets.DEPLOY_HOOK_URL }}"
